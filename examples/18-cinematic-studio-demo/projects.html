<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — STUDIO NOVA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0A0A0F;
      --text: #E8E6E1;
      --muted: #8A8A8A;
      --accent: #C9A962;
      --accent-2: #2D7CFF;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    @view-transition {
      navigation: auto;
    }

    @media (prefers-reduced-motion: reduce) {
      @view-transition {
        navigation: none;
      }
    }

    ::view-transition-old(root) {
      animation: fade-out 0.4s ease forwards;
    }
    ::view-transition-new(root) {
      animation: fade-in 0.4s ease forwards;
    }

    @keyframes fade-out {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(1.05); }
    }
    @keyframes fade-in {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    #grain {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    #vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 0%, transparent 55%, rgba(0,0,0,0.55) 100%);
    }

    .back-link {
      position: fixed;
      top: 32px;
      left: 32px;
      z-index: 50;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.3s;
    }
    .back-link:hover { color: var(--accent); }

    main {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      padding: 120px 5vw 80px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .page-header {
      margin-bottom: 80px;
    }
    .page-header .eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      display: block;
    }
    .page-header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin: 0;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
    }
    .project-card {
      position: relative;
      aspect-ratio: 4 / 3;
      background: #111116;
      overflow: hidden;
      cursor: pointer;
      transition: background 0.4s;
    }
    .project-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-2) 0%, var(--accent) 100%);
      opacity: 0;
      transition: opacity 0.6s;
    }
    .project-card:hover::before { opacity: 0.15; }
    .project-card:hover .project-num { color: var(--accent); }
    .project-card:hover .project-title { transform: translateY(-4px); }

    .project-inner {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 32px;
    }
    .project-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 12px;
      transition: color 0.4s;
    }
    .project-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
      font-size: clamp(1.25rem, 2.5vw, 2rem);
      line-height: 1.15;
      margin: 0;
      transition: transform 0.4s;
    }
    .project-meta {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 8px;
    }

    @media (max-width: 768px) {
      .project-grid { grid-template-columns: 1fr; }
      .back-link { top: 20px; left: 20px; }
      main { padding: 80px 5vw 60px; }
    }
  </style>
</head>
<body>
  <div id="grain" aria-hidden="true"></div>
  <div id="vignette" aria-hidden="true"></div>

  <a href="index.html" class="back-link">&larr; Back to story</a>

  <main>
    <div class="page-header">
      <span class="eyebrow">Selected Work</span>
      <h1>Projects</h1>
    </div>

    <div class="project-grid">
      <div class="project-card">
        <div class="project-inner">
          <span class="project-num">001</span>
          <h3 class="project-title">Meridian</h3>
          <p class="project-meta">Brand Identity / Web Experience</p>
        </div>
      </div>
      <div class="project-card">
        <div class="project-inner">
          <span class="project-num">002</span>
          <h3 class="project-title">Aether</h3>
          <p class="project-meta">3D Product Showcase</p>
        </div>
      </div>
      <div class="project-card">
        <div class="project-inner">
          <span class="project-num">003</span>
          <h3 class="project-title">Obsidian</h3>
          <p class="project-meta">Immersive Narrative</p>
        </div>
      </div>
      <div class="project-card">
        <div class="project-inner">
          <span class="project-num">004</span>
          <h3 class="project-title">Lumen</h3>
          <p class="project-meta">Editorial Design System</p>
        </div>
      </div>
      <div class="project-card">
        <div class="project-inner">
          <span class="project-num">005</span>
          <h3 class="project-title">Nexus</h3>
          <p class="project-meta">Cyberpunk Interactive</p>
        </div>
      </div>
      <div class="project-card">
        <div class="project-inner">
          <span class="project-num">006</span>
          <h3 class="project-title">Monolith</h3>
          <p class="project-meta">Swiss Design Language</p>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
